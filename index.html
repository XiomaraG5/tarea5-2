<!DOCTYPE html>
<html lang="es" dir="ltr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link REL=StyleSheet HREF="style/style.css" TYPE="text/css" MEDIA=screen>
    <title>Tarea5-1</title>
</head>

<body>
    <div class="Formulario">
        <h1>Registrate</h1>
        <p>Es rápido y fácil</p>
        <form>
            <input type="text" name="nombre" placeholder="Nombre">
            <input type="text" name="apellido" placeholder="Apellido"><br>
            <input type="tel" type="email" name="telefono-email" placeholder="Número de celular o correo electronico">
            <br>
            <input type="password" name="contraseña" placeholder="Contraseña nueva">
            <br>
            <label name="fecha-de-nacimiento">Fecha de nacimiento</label><br>
            <select name="dia">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
                <option value="13">13</option>
                <option value="14">14</option>
                <option value="15">15</option>
                <option value="16">16</option>
                <option value="17">17</option>
                <option value="18">18</option>
                <option value="19">19</option>
                <option value="20">20</option>
                <option value="21">21</option>
                <option value="22">22</option>
                <option value="23">23</option>
                <option value="24">24</option>
                <option value="25">25</option>
                <option value="26">26</option>
                <option value="27">27</option>
                <option value="28">28</option>
                <option value="29">29</option>
                <option value="30">30</option>
                <option value="31">31</option>
            </select>
            <select name="mes">
                <option value="enero">Enero</option>
                <option value="ferbrero">Febrero</option>
                <option value="marzo">Marzo</option>
                <option value="abril">Abril</option>
                <option value="mayo">Mayo</option>
                <option value="junio">Junio</option>
                <option value="julio">Julio</option>
                <option value="agosto">Agosto</option>
                <option value="septiembre">Septiembre</option>
                <option value="octubre">Octubre</option>
                <option value="noviembre">Noviembre</option>
                <option value="diciembre">Diciembre</option>
            </select>
            <input type="number" name="año" placeholder="2021" max="2021" min="1930">
            <br>
            <label name="sexo">Sexo</label><br>
            <label class="checkbox" name="mujer">Mujer
                <input type="radio" name="mujer">
            </label>
            <label class="checkbox" name="hombre">Hombre
                <input type="radio" name="hombre">
            </label>
            <label class="checkbox" name="personalizado">Personalizado
                <input type="radio" name="Personalizado">
            </label>
            <p>Al hacer clic en "Registrarte", aceptas nuestras <span>Condiciones</span>, la <spa>Politica de datos
                </spa>y la <span>Politica de cookies.</span>Es posible que te enviemos notificaciones por SMS, que
                puedes desactivar cuando quieras</p>
            <button>Registrarte</button>
        </form>
    </div>
</body>

</html>
